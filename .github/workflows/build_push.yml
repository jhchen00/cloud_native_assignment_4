name: Docker Build and Push on PR to main # Name of the workflow

on:
  pull_request:
    branches:
      - main # This workflow triggers only on pull requests targeting the main branch

jobs:
  build_and_push_docker:
    runs-on: ubuntu-latest # Specify the environment to run the job, using the latest Ubuntu

    steps:
      - name: Checkout code # Step 1: Checkout code
        uses: actions/checkout@v4 # Use the official action to checkout the current branch's code

      - name: Set up Docker Buildx # Step 2: Set up Docker Buildx, recommended for better build performance and features
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub # Step 3: Log in to Docker Hub
        uses: docker/login-action@v3 # Use the official action for Docker Hub login
        with:
          # Use GitHub Secrets to securely store your Docker Hub credentials
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
          # Need to add secrets named DOCKER_HUB_USERNAME and DOCKER_HUB_ACCESS_TOKEN in the GitHub repository settings

      - name: Extract Docker metadata (tags, labels) # Step 4: Extract Docker metadata (tags, labels)
        id: meta # Give this step an ID to reference its outputs later
        uses: docker/metadata-action@v5 # Use the official action to generate tags and metadata based on Git information
        with:
          images: jhchen000/2025cloud # Specify the Docker Image name
          tags: | # Define how to generate tags
            type=sha,format=short # Generate a tag based on the short commit SHA

      - name: Log generated Docker tags
        run: |
          echo "Generated Docker tags: ${{ steps.meta.outputs.tags }}"
          echo "Image will be pushed to: jhchen000/2025cloud with tags: ${{ steps.meta.outputs.tags }}"

      - name: Build and push Docker image # Step 5: Build and push Docker image
        uses: docker/build-push-action@v6 # Use the official action to build and push the Docker image
        with:
          context: . # Specify the build context path for the Dockerfile, '.' means the repository root
          push: true # Set to true to push the image after building
          tags: ${{ steps.meta.outputs.tags }} # Use the tags generated by the previous step (id: meta)
          labels: ${{ steps.meta.outputs.labels }} # Use the metadata labels generated by the previous step (id: meta)
